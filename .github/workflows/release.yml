name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: build and attach binary
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust with musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get install -y musl-tools

      - name: Build release
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Strip binary
        run: strip target/x86_64-unknown-linux-musl/release/tg

      - name: Rename for upload
        run: |
          mkdir -p artifacts
          cp target/x86_64-unknown-linux-musl/release/tg artifacts/tg-x86_64-unknown-linux-musl
          (cd artifacts && sha256sum tg-x86_64-unknown-linux-musl > tg-x86_64-unknown-linux-musl.sha256)

      - name: Attach to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            artifacts/tg-x86_64-unknown-linux-musl \
            artifacts/tg-x86_64-unknown-linux-musl.sha256 \
            --clobber
